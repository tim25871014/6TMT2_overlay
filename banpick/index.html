<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="../_data/deps/reconnecting-websocket.min.js"></script>
</head>

<body>
    <div id="background"></div>
    <video id="background-video" autoplay loop muted>
        <source src="../_data/img/background.mp4" type="video/mp4">
    </video>
    <div id="foreground"></div>
    <div id="header">
        <div id="stage-name">STAGE</div>
        <div id="blue-points"></div>
        <div id="red-points"></div>
        <div id="blue-name">藍隊 Player Blue</div>
        <div id="red-name">紅隊 Player Red</div>
        <img id="blue-flag" src="https://assets.ppy.sh/old-flags/XX.png">
        <img id="red-flag" src="https://assets.ppy.sh/old-flags/XX.png">
    </div>

    <div id="content">
        <div id="pick-wrapper">
            <div id="blue_picks" class="pick-container"></div>
            <div id="red_picks" class="pick-container"></div>
            <div id="tie-breaker">
                <p id="text">Tiebreaker</p>
                <p id="title"></p>
            </div>
        </div>
    </div>

    <div id="footer">
        <div id="now-playing"></div>
        <div id="np-text"></div>
        <div id="np-identifier"></div>
        <div class="scroll-box" id="scrollBox">
            <div class="scroll-content" id="scrollContent"></div>
        </div>
        <div id="chat-container"><div id="chat"></div></div>
        <div id="panel">
            <div id="NM1" class="button-row"></div>
            <div id="NM2" class="button-row"></div>
            <div id="HD"  class="button-row"></div>
            <div id="HR"  class="button-row"></div>
            <div id="DT"  class="button-row"></div>
            <button id="tie-breaker-btn" onclick="tiebreakerPick(event)">TB</button>
        </div>
    </div>
    
    <div id="control">
        <button class="ctrl-btn" id="auto-pick" onclick="switchAutoPick()"></button>
        <button class="ctrl-btn" id="first-pick" onclick="switchFirstPick()"></button>
    </div>

    <script src="../_data/deps/headerHandler.js"></script>
    <script src="../_data/deps/connection.js"></script>
    <script src="script.js"></script>
</body>



</html>
