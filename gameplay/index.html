<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="../_data/deps/countUp.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="../_data/deps/reconnecting-websocket.min.js"></script>
</head>

<body>
    <div id="background"></div>
    <video id="background-video" autoplay loop muted>
        <source src="../_data/img/background.mp4" type="video/mp4">
    </video>
    <div id="foreground"></div>
    <div id="header">
        <div id="stage-name">STAGE</div>
        <div id="blue-points"></div>
        <div id="red-points"></div>
        <div id="blue-name">藍隊 Player Blue</div>
        <div id="red-name">紅隊 Player Red</div>
        <img id="blue-flag" src="https://assets.ppy.sh/old-flags/XX.png">
        <img id="red-flag" src="https://assets.ppy.sh/old-flags/XX.png">
    </div>

    <div id="content"></div>

    <div id="footer">
        <div id="now-playing"></div>
        <div id="np-text"></div>
        <div id="np-identifier"></div>
        <div class="scroll-box" id="scrollBox">
            <div class="scroll-content" id="scrollContent"></div>
        </div>
        <div id="top-footer">
            <div id="lead-bar"></div>
            <div id="score-blue">0</div>
            <div id="score-red">0</div>
        </div>
        <div id="score-diff" data-before="" data-after="">0</div>
        <div id="chat-container">
            <div id="chat"></div>
        </div>
    </div>

    <script src="../_data/deps/headerHandler.js"></script>
    <script src="script.js"></script>
</body>



</html>
