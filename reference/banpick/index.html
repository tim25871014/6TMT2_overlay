<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="../_data/deps/reconnecting-websocket.min.js"></script>
</head>

<body>
    <video id="background-video" autoplay loop muted poster="../_data/assets/stream-gameplay.png">
        <source src="../_data/assets/animated_bg.mp4" type="video/mp4">
    </video>
    <div id="main">
        <div id="full-overlay">
            <div id="stage-name">STAGE</div>
            <div id="header">
                <div id="red-points"></div>
                <div id="blue-points"></div>
                <div id="red-name">紅隊</div>
                <div id="blue-name">Blue Team</div>
                <img id="red-flag" src="https://assets.ppy.sh/old-flags/XX.png">
                <img id="blue-flag" src="https://assets.ppy.sh/old-flags/XX.png">
            </div>
            <div id="header"></div>
            <div id="mappoolContainer">
                <div id="NM" class="mapContainer"></div>
                <div id="HD" class="mapContainer"></div>
                <div id="HR" class="mapContainer"></div>
                <div id="DT" class="mapContainer"></div>
                <div id="FM" class="mapContainer"></div>
                <div id="TB" class="mapContainer"></div>
            </div>
            <div id="ban-overlay">
                <div id="red-bans">
                    <div id="red-ban1" class="banContainer red"><div class="bcov"></div><p></p></div>
                    <div id="red-ban2" class="banContainer red"><div class="bcov"></div><p></p></div>
                </div>
                <div id="blue-bans">
                    <div id="blue-ban1" class="banContainer blue"><div class="bcov"></div><p></p></div>
                    <div id="blue-ban2" class="banContainer blue"><div class="bcov"></div><p></p></div>
                </div>
            </div>
            <div id="pick-overlay">
                <div id="red-picks">
                    <div id="red-pick6" class="pickContainer red"><div class="cov"></div><p></p></div>
                    <div id="red-pick5" class="pickContainer red"><div class="cov"></div><p></p></div>
                    <div id="red-pick4" class="pickContainer red"><div class="cov"></div><p></p></div>
                    <div id="red-pick3" class="pickContainer red"><div class="cov"></div><p></p></div>
                    <div id="red-pick2" class="pickContainer red"><div class="cov"></div><p></p></div>
                    <div id="red-pick1" class="pickContainer red"><div class="cov"></div><p></p></div>
                </div>
                <div id="blue-picks">
                    <div id="blue-pick6" class="pickContainer blue"><div class="cov"></div><p></p></div>
                    <div id="blue-pick5" class="pickContainer blue"><div class="cov"></div><p></p></div>
                    <div id="blue-pick4" class="pickContainer blue"><div class="cov"></div><p></p></div>
                    <div id="blue-pick3" class="pickContainer blue"><div class="cov"></div><p></p></div>
                    <div id="blue-pick2" class="pickContainer blue"><div class="cov"></div><p></p></div>
                    <div id="blue-pick1" class="pickContainer blue"><div class="cov"></div><p></p></div>
                </div>
            </div>

            <div id="chat-container">
                <div id="chat"></div>
            </div>
        </div>
    </div>
    <div id="controls">
        <div id="pickButton" class="pickButton">RED PICK</div>
        <div id="switchPickButton" class="pickButton switchPickButton" onclick="switchPick()">SWITCH PICK</div>
        <div id="autoPickButton" class="pickButton switchPickButton" onclick="switchAutoPick()">AUTOPICK: OFF</div>
    </div>
    <script src="index.js"></script>
</body>

</html>
